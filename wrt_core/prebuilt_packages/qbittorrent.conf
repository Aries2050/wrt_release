# ⭐ 本地定制：qBittorrent 预编译包配置
#
# 此文件用于在固件安装后配置 qBittorrent Web UI 的默认设置。
# 预编译包版本: qbittorrent 5.1.4 / Qt6 / aarch64_cortex-a53
# 安装方式: 在路由器上运行 install.sh install

# qBittorrent Web UI 默认配置
config qbittorrent 'config'
	option enabled '1'
	option port '8080'
	option web_ui_username 'admin'
	option web_ui_password 'adminadmin'
	option anonymous_mode '0'
	option enable_dht '1'
	option enable_pex '1'
	option enable_lsd '1'
	option encryption '0'
	option max_connections '-1'
	option max_connections_per_torrent '-1'
	option max_upload_slots '-1'
	option max_upload_slots_per_torrent '-1'
	option max_active_torrents '-1'
	option max_active_downloads '-1'
	option max_active_uploads '-1'
	option save_path '/mnt/sda1/downloads'
	option temp_path '/mnt/sda1/downloads/temp'
	option preallocate_all '0'
	option queueing_enabled '0'
